<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="addstudent.html">Add Student</a>
        <a href="viewstudents.html"> View Students</a>
        <a href="logout.html">Logout</a>
    </nav>
    <br>

    <div class="form">
        <form onsubmit="addStudent(event)">
            <h3>Add a new Student</h3>

            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter student name" required>
            <br>

            <label for="id">ID:</label>
            <input type="text" name="id" id="id" placeholder="Enter student ID" required>
            <br>

            <label for="cgpa">CGPA:</label>
            <input type="text" name="cgpa" id="cgpa" placeholder="Enter student CGPA" required>
            <br>

            <label for="branch">Branch:</label>
            <input type="text" name="branch" id="branch" placeholder="Enter student branch" required>
            <br>

            <button type="submit">Add Student</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>

</html>
